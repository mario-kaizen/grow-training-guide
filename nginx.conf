server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ /404.html;
    }

    location /_next {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /fonts {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /screenshots {
        expires 30d;
        add_header Cache-Control "public";
    }
}
